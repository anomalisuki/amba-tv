<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indosiar Player - Terminal</title>
    <!-- Library Shaka Player tetap dipertahankan untuk memproses MPD & ClearKey -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.13.6/shaka-player.compiled.js"></script>
    
    <style>
        :root { 
            --bg-color: #050507; 
            --neon-cyan: #00f2fe; 
            --text-main: #ffffff; 
            --text-muted: #6c7a89; 
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .player-header { 
            width: 100%; 
            max-width: 1000px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0, 242, 254, 0.2); 
            padding-bottom: 15px; 
        }
        .title-display { 
            font-size: 16px; 
            font-weight: bold; 
            letter-spacing: 2px; 
            color: var(--neon-cyan); 
            text-transform: uppercase; 
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4); 
        }
        .badge-live { 
            background: rgba(255, 0, 85, 0.1); 
            color: #ff0055; 
            border: 1px solid #ff0055; 
            padding: 6px 12px; 
            font-size: 11px; 
            font-weight: bold; 
            border-radius: 4px; 
            letter-spacing: 1px; 
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); 
        }
        .video-wrapper { 
            width: 100%; 
            max-width: 1000px; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.15); 
            position: relative; 
            aspect-ratio: 16 / 9; 
        }
        video { 
            width: 100%; 
            height: 100%; 
            display: block; 
            aspect-ratio: 16 / 9; 
        }
        .btn-back { 
            margin-top: 25px; 
            background: transparent; 
            color: #6c7a89; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 12px 24px; 
            font-size: 12px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-weight: 600;
            text-decoration: none; 
            display: inline-block;
        }
        .btn-back:hover { 
            color: var(--neon-cyan); 
            border-color: var(--neon-cyan); 
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); 
        }
    </style>
</head>
<body>

    <!-- Structure Mengikuti Kode Kedua Secara Penuh -->
    <div class="player-header">
        <div class="title-display">ONLINE // Indosiar</div>
        <div class="badge-live">● LIVE FEED</div>
    </div>
    
    <div class="video-wrapper">
        <!-- Menggunakan kontrol bawaan browser natif (Play, Mute, PiP, Fullscreen otomatis terhandle) -->
        <video id="video" controls autoplay playsinline></video>
    </div>

    <a href="../" class="btn-back">✕ DISCONNECT TERMINAL</a>

    <script>
        shaka.polyfill.installAll();

        const video = document.getElementById('video');
        // Manifest URL & ClearKeys dari kode pertama tetap dipertahankan agar stream bisa didekripsi
        const manifestUrl = 'https://canal86.my.id/m3u/ch8/out/v1/e930be336fed49e6b26a7554e113f7a4/index.mpd';
        
        const clearKeys = {
            'ab1fe99e4e4f4cbe95930b3154c1fb19': 'c7f529deccbf6709e3e65c61c8d1344f'
        };

        async function initPlayer() {
            if (shaka.Player.isBrowserSupported()) {
                const shakaPlayer = new shaka.Player(video);
                
                // Konfigurasi DRM ClearKeys bawaan
                shakaPlayer.configure({
                    drm: {
                        clearKeys: clearKeys
                    },
                    streaming: {
                        bufferingGoal: 10
                    }
                });

                try {
                    await shakaPlayer.load(manifestUrl);
                    console.log('🎬 Shaka Player berhasil dimuat!');
                    video.play().catch(err => console.log('Autoplay ditangguhkan browser:', err));
                } catch (err) {
                    console.error('Gagal memuat stream:', err);
                }
            } else {
                console.error('Browser tidak mendukung Shaka Player.');
            }
        }

        // Jalankan player setelah elemen HTML siap
        window.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
