<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DASH Player - Indosiar</title>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <style>
        :root { 
            --bg-color: #050507; 
            --neon-cyan: #00f2fe; 
            --text-main: #ffffff; 
            --text-muted: #6c7a89; 
        }
        *, *::before, *::after { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        .player-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0, 242, 254, 0.2); 
            padding-bottom: 15px; 
            margin-bottom: 20px;
        }

        .title-display { 
            font-size: 16px; 
            font-weight: bold; 
            letter-spacing: 2px; 
            color: var(--neon-cyan); 
            text-transform: uppercase; 
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4); 
        }

        .badge-live { 
            background: rgba(255, 0, 85, 0.1); 
            color: #ff0055; 
            border: 1px solid #ff0055; 
            padding: 6px 12px; 
            font-size: 11px; 
            font-weight: bold; 
            border-radius: 4px; 
            letter-spacing: 1px; 
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); 
        }

        .video-wrapper { 
            width: 100%; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.15); 
            position: relative; 
            aspect-ratio: 16 / 9; 
        }

        video { 
            width: 100%; 
            height: 100%; 
            display: block; 
            aspect-ratio: 16 / 9; 
        }

        .btn-back { 
            margin-top: 25px; 
            background: transparent; 
            color: #6c7a89; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 12px 24px; 
            font-size: 12px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-weight: 600; 
            text-decoration: none; 
            display: inline-block; 
        }

        .btn-back:hover { 
            color: var(--neon-cyan); 
            border-color: var(--neon-cyan); 
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); 
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-header">
            <div class="title-display">ONLINE // INDOSIAR</div>
            <div class="badge-live">● LIVE FEED</div>
        </div>
        
        <div class="video-wrapper">
            <video id="video" controls autoplay></video>
        </div>
    </div>

    <a href="../" class="btn-back">✕ DISCONNECT TERMINAL</a>

    <script>
        const video = document.getElementById('video');

        // 🔥 URL Worker proxy
        const WORKER_URL = 'https://mpd.daviesdavid528.workers.dev';
        const MPD_PATH = '/atm/DASH/indosiar/manifest.mpd';
        const streamUrl = WORKER_URL + MPD_PATH;

        console.log('📡 Stream URL:', streamUrl);

        function initDashPlayer() {
            if (dashjs.supportsMediaSource()) {
                const player = dashjs.MediaPlayer().create();
                
                // Inisialisasi Player langsung dengan autoplay
                player.initialize(video, streamUrl, true);
                
                // Event listener error bawaan konsol (opsional untuk debugging)
                player.on('error', (e) => {
                    console.error('❌ DASH Error:', e);
                });
                
            } else {
                console.error('❌ Browser tidak mendukung DASH');
            }
        }

        // Jalankan player setelah DOM siap
        window.addEventListener('DOMContentLoaded', initDashPlayer);
    </script>
</body>
</html>
