<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV One - Player Terminal</title>
    <style>
        :root { 
            --bg-color: #050507; 
            --neon-blue: #00aaff;  /* Biru konsisten seperti Trans 7, CNN, & RCTI */
            --neon-red: #ff0055;   /* Merah konstan untuk Live Feed */
            --text-main: #ffffff; 
            --text-muted: #6c7a89; 
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .player-header { 
            width: 100%; 
            max-width: 1000px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0, 170, 255, 0.2); 
            padding-bottom: 15px; 
        }
        .title-display { 
            font-size: 16px; 
            font-weight: bold; 
            letter-spacing: 2px; 
            color: var(--neon-blue); 
            text-transform: uppercase; 
            text-shadow: 0 0 10px rgba(0, 170, 255, 0.4); 
        }
        .badge-live { 
            background: rgba(255, 0, 85, 0.1); 
            color: var(--neon-red); 
            border: 1px solid var(--neon-red); 
            padding: 6px 12px; 
            font-size: 11px; 
            font-weight: bold; 
            border-radius: 4px; 
            letter-spacing: 1px; 
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); 
        }
        .video-wrapper { 
            width: 100%; 
            max-width: 1000px; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(0, 170, 255, 0.2); 
            box-shadow: 0 0 50px rgba(0, 170, 255, 0.15); 
            position: relative; 
            aspect-ratio: 16 / 9; 
        }
        
        /* Mengatur iframe agar memenuhi 100% ruang bingkai secara responsif */
        iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            top: 0;
            left: 0;
        }
        
        .btn-back { 
            margin-top: 25px; 
            background: transparent; 
            color: #6c7a89; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 12px 24px; 
            font-size: 12px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-weight: 600;
            display: inline-block;
        }
        .btn-back:hover { 
            color: var(--neon-blue); 
            border-color: var(--neon-blue); 
            box-shadow: 0 0 10px rgba(0, 170, 255, 0.2); 
        }
    </style>
</head>
<body>

    <div class="player-header">
        <div class="title-display">ONLINE // TV One</div>
        <div class="badge-live">● LIVE FEED</div>
    </div>
    
    <div class="video-wrapper">
        <!-- Iframe YouTube responsif penuh dengan tombol fullscreen aktif -->
        <iframe 
            src="https://www.youtube.com/embed/rQJoEpzKkNk?si=f6d2kGI_MHvvgOnq" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
    </div>

    <button class="btn-back" onclick="history.back()">✕ DISCONNECT TERMINAL</button>

</body>
</html>
