<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trans 7 Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-color: #050507; --neon-cyan: #00f2fe; --text-main: #ffffff; --text-muted: #6c7a89; }
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .player-header { 
            width: 100%; 
            max-width: 1000px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0, 242, 254, 0.2); 
            padding-bottom: 15px; 
        }
        .title-display { 
            font-size: 16px; 
            font-weight: bold; 
            letter-spacing: 2px; 
            color: var(--neon-cyan); 
            text-transform: uppercase; 
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4); 
        }
        .badge-live { 
            background: rgba(255, 0, 85, 0.1); 
            color: #ff0055; 
            border: 1px solid #ff0055; 
            padding: 6px 12px; 
            font-size: 11px; 
            font-weight: bold; 
            border-radius: 4px; 
            letter-spacing: 1px; 
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); 
        }
        .video-wrapper { 
            width: 100%; 
            max-width: 1000px; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.15); 
            position: relative; 
            aspect-ratio: 16 / 9; 
        }
        video { 
            width: 100%; 
            height: 100%; 
            display: block; 
            aspect-ratio: 16 / 9; 
        }
        .btn-back { 
            margin-top: 25px; 
            background: transparent; 
            color: #6c7a89; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 12px 24px; 
            font-size: 12px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-weight: 600; 
            text-decoration: none; 
            display: inline-block; 
        }
        .btn-back:hover { 
            color: var(--neon-cyan); 
            border-color: var(--neon-cyan); 
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); 
        }
    </style>
</head>
<body>

    <div class="player-header">
        <div class="title-display">ONLINE // Trans 7</div>
        <div class="badge-live">● LIVE FEED</div>
    </div>
    
    <div class="video-wrapper">
        <video id="video" controls autoplay></video>
    </div>

    <a href="../" class="btn-back">✕ DISCONNECT TERMINAL</a>

    <script>
        const video = document.getElementById('video');
        
        // URL 720p
        const streamUrl = 'https://trans7.daviesdavid528.workers.dev/trans7/smil:trans7.smil/chunklist_w1758539238_b744100_sleng.m3u8';

        function initPlayer() {
            if (Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    debug: false,
                    maxBufferLength: 30,
                    maxMaxBufferLength: 600,
                    maxBufferSize: 60 * 1000 * 1000,
                    lowLatencyMode: false,
                    xhrSetup: function(xhr, url) {
                        xhr.setRequestHeader('Referer', 'https://video.detik.com/');
                        xhr.setRequestHeader('Origin', 'https://video.detik.com/');
                        xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');
                    }
                });

                hls.loadSource(streamUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(err => console.log('Autoplay error:', err));
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    console.error('HLS Error:', data);
                    if (data.fatal && data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        hls.startLoad();
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.play().catch(err => console.log('Autoplay error:', err));
            }
        }

        window.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
