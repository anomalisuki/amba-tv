<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" href="src/icon.png" type="image/png">
    <title>Amba TV - 404 Page Not Found</title>
    <style>
        :root { 
            --bg-color: #0a0a0c; 
            --panel-color: #131419; 
            --neon-cyan: #00f2fe; 
            --neon-blue: #4facfe; 
            --neon-magenta: #ff0055; /* Aksen merah/magenta khusus status error */
            --text-main: #ffffff; 
            --text-muted: #6c7a89; 
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            overflow-x: hidden; 
            background-image: linear-gradient(rgba(18, 18, 24, 0.7) 1px, transparent 1px), linear-gradient(90deg, rgba(18, 18, 24, 0.7) 1px, transparent 1px); 
            background-size: 30px 30px; 
        }
        #halaman-error { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            width: 100%; 
            padding: 40px 20px; 
            min-height: 100vh;
        }
        h1 { 
            font-size: 48px; 
            font-weight: 800; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 10px; 
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3); 
            text-align: center;
        }
        .subtitle { 
            color: var(--text-muted); 
            margin-bottom: 50px; 
            font-size: 13px; 
            letter-spacing: 1.5px; 
            text-transform: uppercase; 
            text-align: center;
        }
        .error-container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--panel-color); 
            border: 1px solid rgba(255, 0, 85, 0.2); /* Border magenta tipis penanda error */
            padding: 50px 40px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 30px rgba(255, 0, 85, 0.05); 
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        /* Efek ambient glow merah di belakang panel */
        .error-container::before {
            content: '';
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 20px;
            background: var(--neon-magenta);
            filter: blur(40px);
            opacity: 0.25;
        }
        .panel-label { 
            font-size: 12px; 
            color: var(--neon-magenta); 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            margin-bottom: 25px; 
            font-weight: bold; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
        }
        .panel-label::before { 
            content: ''; 
            display: inline-block; 
            width: 6px; 
            height: 6px; 
            background-color: var(--neon-magenta); 
            box-shadow: 0 0 8px var(--neon-magenta); 
            border-radius: 50%; 
        }
        /* Teks besar 404 bergaya glitch neon digital */
        .error-code {
            font-size: 96px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--neon-magenta), #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 0, 85, 0.4));
        }
        .message-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        .message-desc {
            color: #b5c2d5;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        /* Tombol Kembali dengan tema neon cyan-blue sesuai halaman utama */
        .btn-home {
            display: inline-block;
            background: rgba(0, 242, 254, 0.05);
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 14px 30px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .btn-home:hover {
            color: #ffffff;
            background: rgba(0, 242, 254, 0.15);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
            transform: translateY(-3px);
        }
        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .error-code { font-size: 72px; }
            .error-container {
                padding: 35px 20px;
            }
            .message-title { font-size: 18px; }
            .message-desc { font-size: 13px; }
            .btn-home { padding: 12px 24px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="halaman-error">
        <h1>📺 AMBA TV</h1>
        <p class="subtitle">IPTV Portal - Digital Streaming Experience</p>
        
        <div class="error-container">
            <div class="panel-label">⚠️ HTTP ERROR CODE: 404</div>
            <div class="error-code">404</div>
            <div class="message-title">Halaman Tidak Ditemukan</div>
            <p class="message-desc">
                Maaf url yang kamu tuju tidak ada atau dipindahkan ke url lain.
            </p>
            
            <!-- Link menuju kembali ke halaman utama utama -->
            <a href="/" class="btn-home">⬅️ Kembali Ke Beranda</a>
        </div>
    </div>

</body>
</html>
